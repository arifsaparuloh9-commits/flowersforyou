<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special For Keina</title>
    <script src="https://dekatutorial.github.io/flwr/s.js"></script>
    <style>
        /* CSS ini akan menyembunyikan tulisan di bagian bawah secara paksa */
        body { background-color: #000; margin: 0; }
        
        /* Menyasar semua elemen yang kemungkinan jadi tempat watermark */
        a, footer, p, span, div {
            font-family: Arial, sans-serif;
        }

        /* Sembunyikan link dan teks Deka Tutorial */
        a[href*="dekatutorial"], 
        .watermark, 
        #watermark,
        footer {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>
    <div class="open">
        <i>❤️</i>
        <span>Klik love nya</span>
    </div>

    <script>
        ucapan = 'SELAMAT BERJUANG KEINA';
        musik = 'musik.mp3'; 
        nomorWhatsapp = '';
        idTelegram = '';

        DekaTutorial(ucapan, musik, nomorWhatsapp, idTelegram);

        // Script ini akan terus menyisir layar setiap 0.1 detik 
        // untuk menghapus tulisan "Deka Tutorial" jika muncul
        setInterval(() => {
            const elements = document.querySelectorAll('a, span, p, div');
            elements.forEach((el) => {
                if (el.innerText.includes('Deka') || el.innerText.includes('Tutorial') || el.innerText.includes('Template')) {
                    el.remove(); // Hapus permanen dari layar
                }
            });
        }, 100);
    </script>
</body>
</html>
