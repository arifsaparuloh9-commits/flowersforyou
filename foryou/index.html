<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special For Keina</title>
    <script src="https://dekatutorial.github.io/flwr/s.js"></script>
    <style>
        body { background-color: #000; margin: 0; }
        /* Sembunyikan watermark */
        a, footer, [class*="watermark"] { display: none !important; }
    </style>
</head>
<body>
    <div class="open">
        <i>❤️</i>
        <span>Klik love nya</span>
    </div>

    <script>
        // Pengaturan Teks
        ucapan = 'SELAMAT BERJUANG KEINA';
        musik = 'musik.mp3'; 
        nomorWhatsapp = '';
        idTelegram = '';

        // Menjalankan fungsi utama
        try {
            DekaTutorial(ucapan, musik, nomorWhatsapp, idTelegram);
        } catch (e) {
            console.log("Error loading script");
        }

        // Penghancur watermark otomatis
        setInterval(() => {
            document.querySelectorAll('a, span').forEach((el) => {
                if (el.innerText.includes('Deka') || el.innerText.includes('Tutorial')) {
                    el.remove();
                }
            });
        }, 300);
    </script>
</body>
</html>
