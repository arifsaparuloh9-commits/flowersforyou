<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Special For You</title>
    
    <style>
      /* Sembunyikan semua elemen link dan watermark dengan CSS */
      a, footer, .watermark, #watermark, [class*="watermark"] {
        display: none !important;
        opacity: 0 !important;
        visibility: hidden !important;
      }
    </style>

    <script src="https://dekatutorial.github.io/flwr/s.js"></script>
  </head>
  <body>
    <div class="open">
      <i>❤️</i>
      <span>Klik love nya</span>
    </div>

    <script>
      ucapan = `Buat Kamu ✨`; 
      musik = 'musik.mp3'; 
      nomorWhatsapp = ``;
      idTelegram = ``;

      DekaTutorial(ucapan, musik, nomorWhatsapp, idTelegram);

      // JURUS PAKSA: Hapus paksa semua link (watermark) setiap 0.5 detik
      setInterval(() => {
        const links = document.getElementsByTagName('a');
        for (let i = 0; i < links.length; i++) {
          links[i].remove();
        }
        // Cari juga kalau ada div yang isinya promosi
        const divs = document.getElementsByTagName('div');
        for (let i = 0; i < divs.length; i++) {
          if (divs[i].innerText.includes('Deka') || divs[i].innerText.includes('Tutorial')) {
            divs[i].remove();
          }
        }
      }, 500);
    </script>
  </body>
</html>
