<!DOCTYPE html>

  </head>

    <script>
      // Kata-kata spesial buat Keina
      ucapan = `Untuk Keina|Selamat Semoga sukses|Jangan lupa kepada orangtua`;
 
      
      musik = 'musik.mp3'; 
      nomorWhatsapp = ``;
      idTelegram = ``;

      DekaTutorial(ucapan, musik, nomorWhatsapp, idTelegram);

      // Membersihkan sisa watermark secara berkala
      setInterval(() => {
        const elements = document.querySelectorAll('a, footer, .watermark');
